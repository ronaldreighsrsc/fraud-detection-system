name: CI - Fraud Detection System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test - Import modules
        run: |
          cd src
          python -c "from preprocessing.data_synthesizer import TransactionSynthesizer; print('✅ Synthesizer OK')"
          python -c "from preprocessing.data_loader import DataLoader; print('✅ DataLoader OK')"
          python -c "from preprocessing.feature_engineer import TransactionFeatureEngineer; print('✅ FeatureEngineer OK')"
          python -c "from models.autoencoder import FraudAutoencoder; print('✅ Autoencoder OK')"
          python -c "from models.xgb_detector import FraudXGBoostDetector; print('✅ XGBoost OK')"
          python -c "from models.isolation_forest import AnomalyIsolationForest; print('✅ IsolationForest OK')"
          python -c "from evaluation.metrics_engine import FraudMetricsEngine; print('✅ MetricsEngine OK')"
          python -c "from evaluation.threshold_analyzer import ThresholdAnalyzer; print('✅ ThresholdAnalyzer OK')"
